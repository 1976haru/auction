[theme]
base = "light"
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f5f7fa"
textColor = "#2c3e50"
font = "sans serif"

[server]
headless = true
runOnSave = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[client]
toolbarMode = "viewer"
showErrorDetails = true
