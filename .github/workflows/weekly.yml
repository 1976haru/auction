name: Weekly calendar alert

on:
  schedule:
    # 매주 일요일 저녁 8시 (한국 시간) = UTC 일요일 11:00
    - cron: '0 11 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  weekly-calendar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      USE_MOCK_APIS: ${{ vars.USE_MOCK_APIS || 'true' }}
      USE_AI: ${{ vars.USE_AI || 'false' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DB_PATH: data/auction_agent.db

    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Seed + analyze mock data
        run: python scripts/generate_mock_data.py --count 200 --analyze --reset
      - name: Send weekly calendar (trigger 5)
        run: python -m agents.alert_agent --trigger weekly_calendar
        continue-on-error: true
