name: Daily auction agent run

on:
  schedule:
    # 매일 오전 7시 (한국 시간) = UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      USE_MOCK_APIS: ${{ vars.USE_MOCK_APIS || 'true' }}
      USE_AI: ${{ vars.USE_AI || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
      ONBID_API_KEY: ${{ secrets.ONBID_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DB_PATH: data/auction_agent.db

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init DB
        run: python main.py --init-only

      - name: Run daily pipeline (mock-first)
        run: python scripts/run_daily_pipeline.py --mock --count 100 --top 5

      - name: Send daily recommendations
        run: python -m agents.daily_recommendation_agent
        continue-on-error: true

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auction-runtime-${{ github.run_number }}
          path: |
            data/exports/
            logs/
          retention-days: 7
          if-no-files-found: ignore
