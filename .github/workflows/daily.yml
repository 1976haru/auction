name: Daily auction agent run

on:
  schedule:
    # 매일 오전 7시 (한국 시간) = UTC 22:00
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      USE_MOCK_APIS: ${{ vars.USE_MOCK_APIS || 'true' }}
      USE_AI: ${{ vars.USE_AI || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      PUBLIC_DATA_SERVICE_KEY: ${{ secrets.PUBLIC_DATA_SERVICE_KEY }}
      ONBID_API_KEY: ${{ secrets.ONBID_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DB_PATH: data/auction_agent.db

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init DB
        run: python main.py --init-only

      - name: Run daily pipeline (mock-first)
        run: python scripts/run_daily_pipeline.py --mock --count 100 --top 5

      - name: Send daily recommendations
        run: python -m agents.daily_recommendation_agent
        continue-on-error: true

      - name: Refresh static dashboard JSON
        run: python scripts/export_static_dashboard.py

      - name: Validate static dashboard JSON / RSS
        run: |
          python - <<'PY'
          import json, sys, pathlib, xml.etree.ElementTree as ET
          p = pathlib.Path("docs/data/mock_dashboard.json")
          assert p.exists(), "mock_dashboard.json missing"
          d = json.loads(p.read_text(encoding="utf-8"))
          for k in ("summary", "items", "recommendations", "agent_status",
                    "risk_summary", "confidence_summary"):
              assert k in d, f"missing top-level key: {k}"
          assert len(d["items"]) >= 1
          assert len(d["recommendations"]) >= 1
          item_required = ["id", "source", "address", "item_type",
                           "min_bid_price", "expected_profit", "recommendation_score",
                           "recommendation_grade", "risk_level", "confidence_score"]
          missing = [k for k in item_required if k not in d["items"][0]]
          assert not missing, f"first item missing keys: {missing}"
          print(f"[OK] {p} items={len(d['items'])} recs={len(d['recommendations'])}")
          rss = pathlib.Path("docs/feed.xml")
          if rss.exists():
              tree = ET.parse(rss)
              items = tree.getroot().find("channel").findall("item")
              assert len(items) >= 1, "RSS empty"
              print(f"[OK] {rss} items={len(items)}")
          PY

      - name: Commit refreshed static dashboard JSON / feed
        run: |
          if git diff --quiet docs/data/mock_dashboard.json docs/feed.xml; then
            echo "no changes — skipping commit"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/mock_dashboard.json docs/feed.xml
          git commit -m "chore(docs): refresh static dashboard JSON + RSS [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auction-runtime-${{ github.run_number }}
          path: |
            data/exports/
            docs/data/mock_dashboard.json
            docs/feed.xml
            logs/
          retention-days: 7
          if-no-files-found: ignore
