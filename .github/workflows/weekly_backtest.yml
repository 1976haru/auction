name: Weekly backtest

on:
  schedule:
    # 매주 일요일 새벽 4시 (한국 시간) = UTC 일요일 19:00
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      USE_MOCK_APIS: ${{ vars.USE_MOCK_APIS || 'true' }}
      USE_AI: ${{ vars.USE_AI || 'false' }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-sonnet-4-6' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DB_PATH: data/auction_agent.db

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init DB + seed + analyze mock data
        run: python scripts/generate_mock_data.py --count 200 --analyze --reset

      - name: Run accuracy backtest
        run: python scripts/run_backtest.py --accuracy --start 2024-01-01 --end 2024-07-01

      - name: Send backtest report (telegram)
        run: python -m agents.alert_agent --trigger backtest_report
        continue-on-error: true
