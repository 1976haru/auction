name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      USE_MOCK_APIS: "true"
      USE_AI: "false"
      DB_PATH: "data/ci_test.db"
      EXPORT_DIR: "data/exports"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Init DB
        run: python main.py --init-only

      - name: Generate small mock data
        run: python scripts/generate_mock_data.py --count 50 --seed 42 --reset

      - name: Run daily pipeline (mock, count=50)
        run: python scripts/run_daily_pipeline.py --mock --count 50 --top 5

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

      - name: Validate static dashboard export
        run: python scripts/validate_static_dashboard.py --export

      - name: Upload exports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exports
          path: |
            data/exports/
            docs/data/mock_dashboard.json
            docs/feed.xml
          if-no-files-found: ignore
